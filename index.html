<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultoría Dietética Valenzuela</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="images/logosinfondo.png" alt="Consultoría Dietética Valenzuela" class="logo-img">
        </div>

        <nav>
            <a href="#inicio" class="active">Inicio</a>
            <a href="#sobre-mi">Sobre mí</a>
            <a href="#servicios">Servicios</a>
            <a href="#metodo">Método</a>
            <a href="#blog">Blog</a>
            <a href="#contacto">Contacto</a>

        <div class="cta-container">
            <a href="#contacto" class="btn-reservar">Reservar cita</a>
        </div>

    <section id="inicio" class="hero">
        <div class="texto">
            <h1>Transforma tu alimentación, transforma tu vida</h1>
            <p>
                Consultoría dietética personalizada con A.V. Valenzuela.
            </p>
            <a href="#contacto" class="boton">
                Empieza hoy
            </a>
        </div>

        <div class="imagen">
            <img src="images/inicio.png" alt="Alimentación saludable">
        </div>

    <script src="script.js"></script>

</html>
